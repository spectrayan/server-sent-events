name: Libraries Snapshot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

concurrency:
  group: libs-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build & test the Java library first
  maven_build_test:
    name: Java sse-server • build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
      - name: Build & test sse-server
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U verify'
          working-directory: '.'

  # Deploy snapshots to Maven Central (manual trigger only)
  deploy_snapshot_central:
    name: Deploy snapshot to Maven Central (manual)
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup (snapshots)
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
          server-id: maven-snapshots-repo
          server-username: secrets.MAVEN_SERVER_USERNAME
          server-password: secrets.MAVEN_SERVER_PASSWORD
      - name: Import GPG private key
        uses: spectrayan/github-workflows/.github/actions/gpg-import@v1
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Deploy SNAPSHOT to Maven Central
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U -P snapshot clean deploy'
          working-directory: '.'

  # Deploy snapshots to GitHub Packages automatically on main
  deploy_snapshot_gpr:
    name: Deploy snapshot to GitHub Packages (automatic on main)
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Generate Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
      - name: Deploy SNAPSHOT to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: "-B -U -pl libs/sse-server -Dmaven.deploy.skip=false -Dgpg.skip=true -DmavenAltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} -DmavenAltSnapshotDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} clean deploy"
          working-directory: '.'
