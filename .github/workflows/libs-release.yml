name: Libraries CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  NODE_VERSION: '24'
  NPM_VERSION: '11.6.1'
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

concurrency:
  group: libs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- ANGULAR: build & test ----------
  ng_build_test:
    name: Angular ng-sse-client • build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        with:
          working-directory: '.'
          script: 'build'
      - name: Test
        uses: spectrayan/github-workflows/.github/actions/node-test@v1
        with:
          working-directory: '.'
          script: 'test'
          args: ''

  # ---------- MAVEN: build & test ----------
  maven_build_test:
    name: Java SSE libraries • build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
      - name: Build & test SSE libraries
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U verify'
          working-directory: '.'

  # ---------- Publish to npm (manual only) ----------
  publish_npm:
    name: Publish ng-sse-client to npm
    needs: [ng_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build and Publish (npm run publish)
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          working-directory: '.'
          script: 'publish'

  # ---------- Publish to Maven Central (manual only) ----------
  publish_maven:
    name: Publish SSE libraries to Maven Central
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
          server-id: central
          server-username: ${{ secrets.MAVEN_SERVER_USERNAME }}
          server-password: ${{ secrets.MAVEN_SERVER_PASSWORD }}
      - name: Import GPG private key
        uses: spectrayan/github-workflows/.github/actions/gpg-import@v1
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Deploy to Maven Central
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U -P release clean deploy'
          working-directory: '.'

  # ---------- Publish to GitHub Packages (automatic on push to main) ----------
  publish_gpr_npm:
    name: Publish ng-sse-client to GitHub Packages (npm)
    needs: [ng_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node for GitHub Packages
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@spectrayan'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build package
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        with:
          working-directory: '.'
          script: 'build'
      - name: Publish to GitHub Packages (npm)
        working-directory: dist/libs/ng-sse-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com || echo 'Version already published, skipping'

  publish_gpr_maven:
    name: Publish SSE libraries to GitHub Packages (Maven)
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Generate Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -U -Dmaven.deploy.skip=false -Dgpg.skip=true 
          -DmavenAltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} 
          -DmavenAltSnapshotDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} 
          deploy || echo 'Version already published, skipping'
