name: Libraries CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  NODE_VERSION: '20'
  NPM_VERSION: '11.6.1'
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

concurrency:
  group: libs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- ANGULAR: build & test ----------
  ng_build_test:
    name: Angular ng-sse-client • build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        with:
          working-directory: '.'
          script: 'build'
      - name: Test
        uses: spectrayan/github-workflows/.github/actions/node-test@v1
        with:
          working-directory: '.'
          script: 'test'
          args: ''

  # ---------- MAVEN: build & test ----------
  maven_build_test:
    name: Java sse-server • build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
      - name: Build & test sse-server
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U -pl libs/sse-server verify'
          working-directory: '.'

  # ---------- Publish to npm (tags only) ----------
  publish_npm:
    name: Publish ng-sse-client to npm
    needs: [ng_build_test]
    runs-on: ubuntu-latest
    # Manual only: allow from workflow_dispatch, disable on push/PR
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write # for npm provenance (optional)
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build and Publish (npm run publish)
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          working-directory: '.'
          script: 'publish'

  # ---------- Publish to Maven Central (tags only) ----------
  publish_maven:
    name: Publish sse-server to Maven Central
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    # Manual only: allow from workflow_dispatch, disable on push/PR
    if: github.event_name == 'workflow_dispatch'
    env:
      # Needed by Maven GPG plugin; read from GitHub Secrets
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
          server-id: central
          server-username: secrets.MAVEN_SERVER_USERNAME
          server-password: secrets.MAVEN_SERVER_PASSWORD

      - name: Import GPG private key
        uses: spectrayan/github-workflows/.github/actions/gpg-import@v1
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare and Perform Release (release profile)
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -P release release:prepare release:perform'
          working-directory: '.'

  # ---------- Publish to GitHub Packages (automatic on main) ----------
  publish_gpr_npm:
    name: Publish ng-sse-client to GitHub Packages (npm)
    needs: [ng_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node for GitHub Packages
        uses: spectrayan/github-workflows/.github/actions/node-setup@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          npm-version: ${{ env.NPM_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
      - name: Install dependencies
        uses: spectrayan/github-workflows/.github/actions/npm-install@v1
        with:
          working-directory: '.'
          ci: true
      - name: Build package
        uses: spectrayan/github-workflows/.github/actions/node-build@v1
        with:
          working-directory: '.'
          script: 'build'
      - name: Publish to GitHub Packages (npm)
        working-directory: dist/libs/ng-sse-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Packages requires the npm scope to match the GitHub owner.
          # Remap @spectrayan-sse → @spectrayan for GPR compatibility.
          node -e "
            const pkg = require('./package.json');
            pkg.name = pkg.name.replace('@spectrayan-sse/', '@spectrayan/');
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "
          npm publish --registry=https://npm.pkg.github.com

  publish_gpr_maven:
    name: Publish sse-server to GitHub Packages (Maven)
    needs: [maven_build_test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup (GitHub Packages)
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to GitHub Packages
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: "-B -U -pl libs/sse-server -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }} deploy"
          working-directory: '.'
