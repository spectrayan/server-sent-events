name: Libraries Milestone/Release (Manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (milestone, rc, release)'
        required: true
        default: 'release'
        type: choice
        options:
          - milestone
          - rc
          - release
      dryRun:
        description: 'Dry run — build and verify only, do not publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

concurrency:
  group: libs-milestone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare_verify:
    name: Verify Java SSE libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
      - name: Build & test SSE libraries
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: '-B -U verify'
          working-directory: '.'

  release:
    name: Deploy to Maven Central (${{ inputs.channel }})
    needs: [prepare_verify]
    runs-on: ubuntu-latest
    if: ${{ inputs.dryRun == false }}
    env:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: spectrayan/github-workflows/.github/actions/java-setup@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Maven Setup (Central)
        uses: spectrayan/github-workflows/.github/actions/maven-setup@v1
        with:
          settings-file: .mvn/settings.xml
          working-directory: '.'
          server-id: central
          server-username: secrets.MAVEN_SERVER_USERNAME
          server-password: secrets.MAVEN_SERVER_PASSWORD
      - name: Import GPG private key
        uses: spectrayan/github-workflows/.github/actions/gpg-import@v1
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Deploy to Maven Central
        uses: spectrayan/github-workflows/.github/actions/maven-build@v1
        with:
          goals: "-B -U -P ${{ inputs.channel }} clean deploy"
          working-directory: '.'
